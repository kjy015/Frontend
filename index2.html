<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style2.css">
  <title>아기사자 자기소개</title>
</head>

<div class="card-container">
  <div class="card"> </div>
  <div class="card"> </div>
  <div class="card"> </div>
</div>

<body>
    <div class="card-container">
        <div class="card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.4JLunrUtJp_neU_et9kcGwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="프로필 사진" width="100px" height="100px">
            <h1>권지윤</h1>
            <p class="part"><b>Frontend</b></p>
            <p>무럭무럭 자라고 있는 새싹 개발자입니다!</p>
        </div>

        <div class="card">
            <img src="https://img.freepik.com/premium-vector/cute-kawaii-shiba-inu-dog-cartoon-style-character-mascot-corgi-dog_945253-162.jpg?w=360" alt="프로필 사진" width="100px" height="100px">
            <h1>코기</h1>
            <p class="part"><b>Backend</b></p>
            <p>열심히 성장하고 있는 백엔드 개발자입니다.</p>
        </div>

        <div class="card">
            <img src="https://png.pngtree.com/png-clipart/20230914/original/pngtree-cute-white-rabbit-cartoon-illustration-png-image_12152977.png" alt="프로필 사진" width="100px" height="100px">
            <h1>토순이</h1>
            <p class="part"><b>Design</b></p>
            <p>차근차근 성장 중인 토끼같은 개발자입니다.</p>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/originals/37/8a/c1/378ac130ef51e36693af2524e44e8dea.gif" alt="프로필 사진" width="100px" height="100px">
            <h1>시나모롤</h1>
            <p class="part"><b>Product Manager</b></p>
            <p>오늘도 열공 중!</p>
        </div>

        <div class="card">
            <img src="https://i.pinimg.com/736x/78/13/04/7813043f489ee87bb6d8de4b6b62051a.jpg" alt="프로필 사진" width="100px" height="100px">
            <h1>스폰지밥</h1>
            <p class="part"><b>Frontend</b></p>
            <p>프로그래밍 좋아~</p>
        </div>

        <div class="card">
            <img src="https://th.bing.com/th/id/OIP.t9-keVse2caISrBcaEg4MQHaHr?w=181&h=188&c=7&r=0&o=5&dpr=2&pid=1.7" alt="프로필 사진" width="100px" height="100px">
            <h1>포돌이</h1>
            <p class="part"><b>Backend</b></p>
            <p>절대 뚫리지 않는 보안</p>
